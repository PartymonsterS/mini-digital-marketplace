<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mini Digital Marketplace{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'products:home' %}">Marketplace</a>

            <div class="collapse navbar-collapse show">
                <div class="navbar-nav me-auto">
                    <a class="nav-link" href="{% url 'products:home' %}">Home</a>
                    <a class="nav-link" href="/admin/">Admin</a>

                    {% if user.is_authenticated %}
                        <a class="nav-link" href="{% url 'products:product_create' %}">Create product</a>
                        <a class="nav-link" href="{% url 'products:my_products' %}">My products</a>
                        <a class="nav-link" href="{% url 'orders:my_orders' %}">My orders</a>
                    {% endif %}
                </div>

                <div class="d-flex align-items-center gap-2">
                    {% if user.is_authenticated %}
                        <span class="text-white me-2">Hi, {{ user.username }}</span>
                        <form action="{% url 'logout' %}" method="post" class="d-inline">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                        </form>
                    {% else %}
                        <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">Login</a>
                        <a href="{% url 'accounts:register' %}" class="btn btn-primary btn-sm">Register</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <main class="container pb-5">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
