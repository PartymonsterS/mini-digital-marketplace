{% extends "base.html" %}

{% block title %}Delete Product{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="bg-white p-4 rounded shadow-sm">
                <h1 class="mb-3">Delete Product</h1>

                <p>Are you sure you want to delete <strong>{{ object.title }}</strong>?</p>
                <p class="text-muted">This action cannot be undone.</p>

                <form method="post" class="d-flex gap-2">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Delete</button>
                    <a href="{% url 'products:product_detail' object.slug %}" class="btn btn-outline-secondary">
                        Cancel
                    </a>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
