{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="bg-white p-4 rounded shadow-sm">
                <h1 class="mb-4">Register</h1>

                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-dark">Create account</button>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
